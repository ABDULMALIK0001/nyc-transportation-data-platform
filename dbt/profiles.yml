nyc_transportation:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'pipeline_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'pipeline_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'nyc_data') }}"
      schema: gold
      threads: 4
      connect_timeout: 10
