services:
  minio:
    image: minio/minio:latest
    container_name: nyc-data-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nyc-data-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nyc_data}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pipeline_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./docker/postgres/migrations/004_warehouse.sql:/docker-entrypoint-initdb.d/002_warehouse.sql:ro
      - ./docker/postgres/migrations/005_airflow_database.sql:/docker-entrypoint-initdb.d/003_airflow_database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline_user} -d ${POSTGRES_DB:-nyc_data}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  spark:
    image: spark:4.1.2-python3
    working_dir: /opt/project
    user: "0:0"
    environment:
      SPARK_LOCAL_IP: 127.0.0.1
    volumes:
      - .:/opt/project
    profiles:
      - tools

  airflow-init:
    &airflow-common
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: nyc-data-airflow:3.3.0
    user: "0:0"
    command: version
    environment:
      &airflow-environment
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-pipeline_user}:${POSTGRES_PASSWORD:-pipeline_password}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API_AUTH__JWT_SECRET: local_learning_jwt_secret
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-nyc_data}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pipeline_password}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      DOCKER_PROJECT_PATH: ${DOCKER_PROJECT_PATH:-}
    volumes:
      - .:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  airflow-apiserver:
    <<: *airflow-common
    user: "50000:0"
    command: api-server
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-environment
      _AIRFLOW_DB_MIGRATE: ""
      _AIRFLOW_WWW_USER_CREATE: ""
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    user: "50000:0"
    command: scheduler
    environment:
      <<: *airflow-environment
      _AIRFLOW_DB_MIGRATE: ""
      _AIRFLOW_WWW_USER_CREATE: ""
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    user: "50000:0"
    command: dag-processor
    environment:
      <<: *airflow-environment
      _AIRFLOW_DB_MIGRATE: ""
      _AIRFLOW_WWW_USER_CREATE: ""
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
